name: cibuildwheel
description: 'Installs and runs cibuildwheel on the current runner'
inputs:
  package-dir:
    description: 'Input directory, defaults to "."'
    required: false
    default: .
  output-dir:
    description: 'Folder to place the outputs in, defaults to "wheelhouse"'
    required: false
    default: wheelhouse
  config-file:
    description: 'File containing the config, defaults to {package}/pyproject.toml'
    required: false
    default: ''
  only:
    description: 'Build a specific wheel only. No need for arch/platform if this is set'
    required: false
    default: ''
  extras:
    description: 'Comma-separated list of extras to install'
    required: false
    default: ''
branding:
  icon: package
  color: yellow

runs:
  using: composite
  steps:
    - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
      id: python
      with:
        python-version: "3.11 - 3.14"
        update-environment: false

    - id: cibw
      env:
        CIBW_ACTION_EXTRAS: ${{ inputs.extras }}
      run: |
        # Install cibuildwheel
        "${{ steps.python.outputs.python-path }}" -u << "EOF"
        import os
        import shutil
        import sys
        import venv

        from pathlib import Path
        from subprocess import run

        EXTRAS = set(e.strip() for e in os.environ.get("CIBW_ACTION_EXTRAS", "").split(",") if e.strip())


        class EnvBuilder(venv.EnvBuilder):
            def __init__(self):
                super().__init__()

            def setup_scripts(self, context):
                pass

            def post_setup(self, context):
                super().post_setup(context)
                self.bin_path = Path(context.env_exe).parent
                install_spec = r"${{ github.action_path }}"
                if EXTRAS:
                    install_spec += f"[{','.join(sorted(EXTRAS))}]"
                run([sys.executable, "-m", "pip", "--python", context.env_exe, "install", install_spec], check=True)


        print("::group::Install cibuildwheel")
        venv_path = Path(r"${{ runner.temp }}") / "cibw"
        if venv_path.exists():
            shutil.rmtree(venv_path)

        builder = EnvBuilder()
        builder.create(venv_path)
        exposed_binaries = {"cibuildwheel"}

        if "uv" in EXTRAS:
            exposed_binaries.add("uv")
        clean_bin_path = builder.bin_path.parent / f"{builder.bin_path.name}.clean"
        clean_bin_path.mkdir()

        for path in list(builder.bin_path.iterdir()):
            if path.stem in exposed_binaries:
                try:
                    os.symlink(path, clean_bin_path / path.name)
                except OSError:
                    shutil.copy2(path, clean_bin_path / path.name)

        cibw_bin = [p for p in builder.bin_path.glob("cibuildwheel*") if p.stem == "cibuildwheel"][0]

        with open(os.environ["GITHUB_OUTPUT"], "at") as f:
            f.write(f"cibw-bin={cibw_bin}\n")
            f.write(f"prepend-path={clean_bin_path}\n")

        print("::endgroup::")
        EOF
      shell: bash

    # Redirecting stderr to stdout to fix interleaving issue in Actions.
    - env:
        CIBW_PACKAGE_DIR: ${{ inputs.package-dir }}
        CIBW_OUTPUT_DIR: ${{ inputs.output-dir }}
        CIBW_CONFIG_FILE: ${{ inputs.config-file }}
        CIBW_ONLY: ${{ inputs.only }}
      run: |
        export PATH="${{ steps.cibw.outputs.prepend-path }}:$PATH"

        args=("${{ steps.cibw.outputs.cibw-bin }}" "$CIBW_PACKAGE_DIR")
        [[ -n "$CIBW_OUTPUT_DIR"  ]] && args+=(--output-dir  "$CIBW_OUTPUT_DIR")
        [[ -n "$CIBW_CONFIG_FILE" ]] && args+=(--config-file "$CIBW_CONFIG_FILE")
        [[ -n "$CIBW_ONLY"        ]] && args+=(--only        "$CIBW_ONLY")
        "${args[@]}" 2>&1
      shell: bash
      if: runner.os != 'Windows'

    # Windows needs powershell to interact nicely with Meson
    - env:
        CIBW_PACKAGE_DIR: ${{ inputs.package-dir }}
        CIBW_OUTPUT_DIR: ${{ inputs.output-dir }}
        CIBW_CONFIG_FILE: ${{ inputs.config-file }}
        CIBW_ONLY: ${{ inputs.only }}
      run: |
        $env:PATH = "${{ steps.cibw.outputs.prepend-path }};$env:PATH"
        $args = @($env:CIBW_PACKAGE_DIR)
        if ($env:CIBW_OUTPUT_DIR)  { $args += "--output-dir",  $env:CIBW_OUTPUT_DIR }
        if ($env:CIBW_CONFIG_FILE) { $args += "--config-file", $env:CIBW_CONFIG_FILE }
        if ($env:CIBW_ONLY)        { $args += "--only",        $env:CIBW_ONLY }
        & "${{ steps.cibw.outputs.cibw-bin }}" @args
      shell: pwsh
      if: runner.os == 'Windows'
